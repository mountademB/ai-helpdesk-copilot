spring:
  application:
    name: helpdesk-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/helpdesk
    username: helpdesk
    password: helpdesk

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

server:
  port: 8080

helpdesk:
  ai:
    provider: "${HELPDESK_AI_PROVIDER:rule}"
    openai:
      api-key: "${OPENAI_API_KEY:}"
      model: "${OPENAI_MODEL:}"
    ollama:
      base-url: "${OLLAMA_BASE_URL:http://localhost:11434/api}"
      model: "${OLLAMA_MODEL:qwen2.5:7b-instruct}"
